<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: var(--vscode-sideBar-background);
            --fg: var(--vscode-sideBar-foreground);
            --input-bg: var(--vscode-input-background);
            --input-fg: var(--vscode-input-foreground);
            --input-border: var(--vscode-input-border);
            --btn-bg: var(--vscode-button-background);
            --btn-fg: var(--vscode-button-foreground);
            --btn-hover: var(--vscode-button-hoverBackground);
            --btn-secondary-bg: var(--vscode-button-secondaryBackground);
            --btn-secondary-fg: var(--vscode-button-secondaryForeground);
            --border: var(--vscode-panel-border);
            --badge-bg: var(--vscode-badge-background);
            --badge-fg: var(--vscode-badge-foreground);
            --success: #4ec9b0;
            --error: #f44747;
            --warning: #cca700;
            --info: #3794ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--fg);
            background: var(--bg);
            padding: 0;
            overflow-x: hidden;
        }

        .section {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.85;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }

        .section-header .icon {
            font-size: 14px;
        }

        .section-header .collapse-icon {
            margin-left: auto;
            transition: transform 0.2s;
        }

        .section.collapsed .section-content {
            display: none;
        }

        .section.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }

        .form-group {
            margin-bottom: 8px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 3px;
        }

        input, select {
            width: 100%;
            padding: 5px 8px;
            background: var(--input-bg);
            color: var(--input-fg);
            border: 1px solid var(--input-border, transparent);
            border-radius: 3px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--info);
        }

        .form-row {
            display: flex;
            gap: 8px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-row .form-group.small {
            flex: 0 0 70px;
        }

        button {
            width: 100%;
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background 0.15s;
        }

        .btn-primary {
            background: var(--btn-bg);
            color: var(--btn-fg);
        }

        .btn-primary:hover {
            background: var(--btn-hover);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-fg);
        }

        .btn-danger {
            background: #a1260d;
            color: white;
        }

        .btn-danger:hover {
            background: #c4280e;
        }

        .btn-success {
            background: #2e7d32;
            color: white;
        }

        .btn-success:hover {
            background: #388e3c;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn-row button {
            flex: 1;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-badge.connected {
            background: rgba(78, 201, 176, 0.15);
            color: var(--success);
        }

        .status-badge.disconnected {
            background: rgba(244, 71, 71, 0.15);
            color: var(--error);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.green {
            background: var(--success);
            box-shadow: 0 0 4px var(--success);
        }

        .status-dot.red {
            background: var(--error);
            box-shadow: 0 0 4px var(--error);
        }

        /* Progress bars */
        .stat-item {
            margin-bottom: 10px;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 3px;
        }

        .stat-label {
            opacity: 0.85;
        }

        .stat-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.3s;
        }

        .progress-fill.low {
            background: var(--success);
        }

        .progress-fill.medium {
            background: var(--warning);
        }

        .progress-fill.high {
            background: var(--error);
        }

        /* File list */
        .file-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 4px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            gap: 6px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-icon {
            opacity: 0.6;
            flex-shrink: 0;
        }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            opacity: 0.5;
            font-size: 10px;
            flex-shrink: 0;
        }

        .file-download {
            background: none;
            border: none;
            color: var(--info);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 12px;
            width: auto;
            opacity: 0.6;
            transition: opacity 0.15s;
        }

        .file-download:hover {
            opacity: 1;
        }

        /* Log area */
        .log-area {
            max-height: 120px;
            overflow-y: auto;
            font-family: var(--vscode-editor-font-family, monospace);
            font-size: 11px;
            padding: 6px;
            background: rgba(0,0,0,0.15);
            border-radius: 3px;
            line-height: 1.5;
        }

        .log-entry {
            opacity: 0.8;
            word-break: break-all;
        }

        .log-entry:last-child {
            opacity: 1;
        }

        .server-info {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .empty-state {
            text-align: center;
            opacity: 0.5;
            padding: 16px 0;
            font-size: 12px;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .deploying {
            animation: pulse 1.5s infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinning {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <!-- CONNECTION SECTION -->
    <div class="section" id="connectionSection">
        <div class="section-header" onclick="toggleSection('connectionSection')">
            <span class="icon">🔌</span>
            <span>Verbindung</span>
            <span id="connBadge" class="status-badge disconnected">
                <span class="status-dot red"></span> Offline
            </span>
            <span class="collapse-icon">▼</span>
        </div>
        <div class="section-content">
            <div class="form-row">
                <div class="form-group">
                    <label>Host / IP</label>
                    <input type="text" id="hostInput" placeholder="192.168.1.100">
                </div>
                <div class="form-group small">
                    <label>Port</label>
                    <input type="number" id="portInput" value="22">
                </div>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="usernameInput" placeholder="user">
            </div>
            <div class="form-group">
                <label>Passwort (leer = Key / Prompt)</label>
                <input type="password" id="passwordInput" placeholder="optional">
            </div>
            <div class="form-group">
                <label>Private Key Pfad</label>
                <input type="text" id="keyPathInput" placeholder="~/.ssh/id_rsa">
            </div>
            <div class="btn-row">
                <button class="btn-success" id="connectBtn" onclick="handleConnect()">
                    ⚡ Verbinden
                </button>
                <button class="btn-danger" id="disconnectBtn" onclick="handleDisconnect()" disabled>
                    ✕ Trennen
                </button>
            </div>
        </div>
    </div>

    <!-- DEPLOY & RUN SECTION -->
    <div class="section" id="deploySection">
        <div class="section-header" onclick="toggleSection('deploySection')">
            <span class="icon">🚀</span>
            <span>Deploy & Run</span>
            <span class="collapse-icon">▼</span>
        </div>
        <div class="section-content">
            <div class="form-group">
                <label>Run Command (leer = Auto-Detect)</label>
                <input type="text" id="runCommandInput" placeholder="z.B. python3 main.py">
            </div>
            <button class="btn-primary" id="deployBtn" onclick="handleDeploy()" disabled>
                <span id="deployIcon">📦</span> Code deployen
            </button>
            <div class="btn-row" style="margin-top: 6px;">
                <button class="btn-success" id="runBtn" onclick="handleRun()" disabled>
                    ▶ Ausführen
                </button>
                <button class="btn-danger" id="stopBtn" onclick="handleStop()" disabled>
                    ■ Stoppen
                </button>
            </div>
        </div>
    </div>

    <!-- SERVER STATUS SECTION -->
    <div class="section" id="statusSection">
        <div class="section-header" onclick="toggleSection('statusSection')">
            <span class="icon">📊</span>
            <span>Server Status</span>
            <span class="collapse-icon">▼</span>
        </div>
        <div class="section-content">
            <div id="statusContent">
                <div class="empty-state">Nicht verbunden</div>
            </div>
        </div>
    </div>

    <!-- OUTPUT FILES SECTION -->
    <div class="section" id="outputSection">
        <div class="section-header" onclick="toggleSection('outputSection')">
            <span class="icon">📁</span>
            <span>Output Dateien</span>
            <span class="collapse-icon">▼</span>
        </div>
        <div class="section-content">
            <div class="btn-row" style="margin-bottom: 8px;">
                <button class="btn-primary" id="pullAllBtn" onclick="handlePullOutput()" disabled>
                    ⬇ Alle herunterladen
                </button>
                <button class="btn-secondary" onclick="handleRefreshFiles()" style="flex: 0 0 auto; width: auto; padding: 6px 10px;">
                    🔄
                </button>
            </div>
            <div id="fileList">
                <div class="empty-state">Keine Dateien</div>
            </div>
        </div>
    </div>

    <!-- LOG SECTION -->
    <div class="section" id="logSection">
        <div class="section-header" onclick="toggleSection('logSection')">
            <span class="icon">📋</span>
            <span>Log</span>
            <span class="collapse-icon">▼</span>
        </div>
        <div class="section-content">
            <div class="log-area" id="logArea">
                <div class="log-entry">Bereit.</div>
            </div>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        // Elements
        const hostInput = document.getElementById('hostInput');
        const portInput = document.getElementById('portInput');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const keyPathInput = document.getElementById('keyPathInput');
        const runCommandInput = document.getElementById('runCommandInput');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const deployBtn = document.getElementById('deployBtn');
        const runBtn = document.getElementById('runBtn');
        const stopBtn = document.getElementById('stopBtn');
        const pullAllBtn = document.getElementById('pullAllBtn');
        const connBadge = document.getElementById('connBadge');
        const statusContent = document.getElementById('statusContent');
        const fileList = document.getElementById('fileList');
        const logArea = document.getElementById('logArea');
        const deployIcon = document.getElementById('deployIcon');

        let isConnected = false;

        // Request initial state
        vscode.postMessage({ type: 'getInitialState' });

        // Handle messages from extension
        window.addEventListener('message', (event) => {
            const msg = event.data;
            switch (msg.type) {
                case 'initialState':
                    hostInput.value = msg.data.host || '';
                    portInput.value = msg.data.port || 22;
                    usernameInput.value = msg.data.username || '';
                    keyPathInput.value = msg.data.privateKeyPath || '';
                    runCommandInput.value = msg.data.runCommand || '';
                    if (msg.data.connected) {
                        setConnected(true);
                    }
                    break;

                case 'connectionStatus':
                    setConnected(msg.connected);
                    break;

                case 'serverStatus':
                    updateServerStatus(msg.data);
                    break;

                case 'deployStatus':
                    if (msg.status === 'deploying') {
                        deployBtn.disabled = true;
                        deployIcon.className = 'spinning';
                        deployIcon.textContent = '⟳';
                    } else {
                        deployBtn.disabled = !isConnected;
                        deployIcon.className = '';
                        deployIcon.textContent = '📦';
                    }
                    break;

                case 'runStatus':
                    if (msg.status === 'running') {
                        runBtn.disabled = true;
                        stopBtn.disabled = false;
                    } else {
                        runBtn.disabled = !isConnected;
                        stopBtn.disabled = true;
                    }
                    break;

                case 'outputFiles':
                    updateFileList(msg.files);
                    break;

                case 'log':
                    addLog(msg.message);
                    break;
            }
        });

        function setConnected(connected) {
            isConnected = connected;
            connectBtn.disabled = connected;
            disconnectBtn.disabled = !connected;
            deployBtn.disabled = !connected;
            runBtn.disabled = !connected;
            pullAllBtn.disabled = !connected;

            if (connected) {
                connBadge.className = 'status-badge connected';
                connBadge.innerHTML = '<span class="status-dot green"></span> Online';
            } else {
                connBadge.className = 'status-badge disconnected';
                connBadge.innerHTML = '<span class="status-dot red"></span> Offline';
                statusContent.innerHTML = '<div class="empty-state">Nicht verbunden</div>';
                stopBtn.disabled = true;
            }
        }

        function updateServerStatus(data) {
            const cpuClass = data.cpuUsage < 50 ? 'low' : data.cpuUsage < 80 ? 'medium' : 'high';
            const memClass = data.memoryPercent < 50 ? 'low' : data.memoryPercent < 80 ? 'medium' : 'high';
            const diskClass = data.diskPercent < 50 ? 'low' : data.diskPercent < 80 ? 'medium' : 'high';

            statusContent.innerHTML = `
                <div class="server-info">
                    🖥 ${data.hostname} &nbsp;|&nbsp; ⏱ ${data.uptime}
                </div>
                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-label">CPU</span>
                        <span class="stat-value">${data.cpuUsage}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${cpuClass}" style="width: ${data.cpuUsage}%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-label">RAM</span>
                        <span class="stat-value">${data.memoryUsed} / ${data.memoryTotal} MB (${data.memoryPercent}%)</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${memClass}" style="width: ${data.memoryPercent}%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-label">Disk</span>
                        <span class="stat-value">${data.diskUsed} / ${data.diskTotal} (${data.diskPercent}%)</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${diskClass}" style="width: ${data.diskPercent}%"></div>
                    </div>
                </div>
            `;
        }

        function updateFileList(files) {
            if (!files || files.length === 0) {
                fileList.innerHTML = '<div class="empty-state">Keine Output-Dateien</div>';
                return;
            }

            let html = '<ul class="file-list">';
            for (const file of files) {
                html += `
                    <li class="file-item">
                        <span class="file-icon">📄</span>
                        <span class="file-name" title="${file.name}">${file.name}</span>
                        <span class="file-size">${file.sizeFormatted}</span>
                        <button class="file-download" onclick="downloadFile('${file.path}')" title="Herunterladen">⬇</button>
                    </li>
                `;
            }
            html += '</ul>';
            fileList.innerHTML = html;
        }

        function addLog(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.textContent = `[${time}] ${message}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;

            // Keep only last 50 entries
            while (logArea.children.length > 50) {
                logArea.removeChild(logArea.firstChild);
            }
        }

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('collapsed');
        }

        function handleConnect() {
            vscode.postMessage({
                type: 'connect',
                data: {
                    host: hostInput.value,
                    port: parseInt(portInput.value) || 22,
                    username: usernameInput.value,
                    password: passwordInput.value || undefined,
                    privateKeyPath: keyPathInput.value || undefined,
                }
            });
        }

        function handleDisconnect() {
            vscode.postMessage({ type: 'disconnect' });
        }

        function handleDeploy() {
            vscode.postMessage({ type: 'deploy' });
        }

        function handleRun() {
            const cmd = runCommandInput.value.trim();
            vscode.postMessage({ type: 'run', data: { command: cmd || undefined } });
        }

        function handleStop() {
            vscode.postMessage({ type: 'stop' });
        }

        function handlePullOutput() {
            vscode.postMessage({ type: 'pullOutput' });
        }

        function handleRefreshFiles() {
            vscode.postMessage({ type: 'refreshFiles' });
        }

        function downloadFile(filePath) {
            vscode.postMessage({ type: 'downloadFile', data: { path: filePath } });
        }
    </script>
</body>
</html>
